<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1b4b">
<title>Swiper</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="iphone">
  <div class="screen" id="screen">

    <!-- ══ STATIC BACKGROUND — never moves ══ -->
    <div class="bg-static">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
      <div class="blob blob-4"></div>
    </div>

    <!-- ══ PAGE 1 ══ -->
    <div class="page" id="page1" style="transform:translateX(0);opacity:1">
      <div class="icons-grid" id="grid1"></div>
      <div class="page-dots"><div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>

    <!-- ══ PAGE 2 ══ -->
    <div class="page" id="page2" style="transform:translateX(100%);opacity:1">
      <div class="icons-grid" id="grid2"></div>
      <div class="page-dots"><div class="dot"></div><div class="dot active"></div><div class="dot"></div><div class="dot"></div></div>
    </div>

    <!-- ══ PAGE 3 — 7 icons screen ══ -->
    <div class="page" id="page3" style="transform:translateX(100%);opacity:1">

      <div class="icons-grid" id="grid3">
        <!-- Row 1: 4 decorative icons -->
        <div class="app-icon shape-squircle deco-icon">
          <div class="icon-img deco-calendar"><span class="icon-emoji">📅</span></div>
          <span class="icon-name">Calendar</span>
        </div>
        <div class="app-icon shape-squircle deco-icon">
          <div class="icon-img deco-clock"><span class="icon-emoji">⏰</span></div>
          <span class="icon-name">Clock</span>
        </div>
        <div class="app-icon shape-squircle deco-icon">
          <div class="icon-img deco-weather"><span class="icon-emoji">🌤️</span></div>
          <span class="icon-name">Weather</span>
        </div>
        <div class="app-icon shape-squircle deco-icon">
          <div class="icon-img deco-photos"><span class="icon-emoji">🖼️</span></div>
          <span class="icon-name">Photos</span>
        </div>
        <!-- Row 2: col-0 deco · col-1 NOTES · col-2 deco -->
        <div class="app-icon shape-squircle deco-icon">
          <div class="icon-img deco-music"><span class="icon-emoji">🎵</span></div>
          <span class="icon-name">Music</span>
        </div>
        <div class="app-icon shape-squircle" id="notesIcon">
          <div class="icon-img icon-notes"><span class="icon-emoji">📝</span></div>
          <span class="icon-name">Notes</span>
        </div>
        <div class="app-icon shape-squircle deco-icon">
          <div class="icon-img deco-maps"><span class="icon-emoji">🗺️</span></div>
          <span class="icon-name">Maps</span>
        </div>
      </div>
      <div class="page-dots"><div class="dot"></div><div class="dot"></div><div class="dot active"></div><div class="dot"></div></div>
    </div>

    <!-- ══ PAGE 4: Result list ══ -->
    <div class="page result-page" id="page4" style="transform:translateX(100%);opacity:1">
      <div class="result-header">
        <div class="notes-title">Notes</div>
      </div>
      <div class="items-list" id="itemsList"></div>
      <div class="back-strip">← גרור ימינה לחזרה</div>
      <div class="edge-indicator"></div>
    </div>

    <!-- ══ DOCK + HOME INDICATOR — fixed, outside all pages ══ -->
    <div class="dock">
      <!-- Phone -->
      <div class="dock-icon"><div class="icon-img dock-phone shape-squircle"><svg width="30" height="30" viewBox="0 0 24 24" fill="white"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg></div></div>
      <!-- WhatsApp -->
      <div class="dock-icon"><div class="icon-img dock-whatsapp shape-squircle"><svg width="30" height="30" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg></div></div>
      <!-- Chrome -->
      <div class="dock-icon"><div class="icon-img dock-chrome shape-squircle"><svg width="40" height="40" viewBox="0 0 100 100"><path d="M50,50 L50,10 A40,40,0,0,1,84.64,70 Z" fill="#EA4335"/><path d="M50,50 L84.64,70 A40,40,0,0,1,15.36,70 Z" fill="#34A853"/><path d="M50,50 L15.36,70 A40,40,0,0,1,50,10 Z" fill="#4285F4"/><circle cx="50" cy="50" r="22" fill="white"/><circle cx="50" cy="50" r="16" fill="#4285F4"/></svg></div></div>
      <!-- Messages -->
      <div class="dock-icon"><div class="icon-img dock-messages shape-squircle"><svg width="30" height="30" viewBox="0 0 24 24" fill="white"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></div></div>
    </div>
    <div class="home-indicator"></div>

    <!-- ══ SETTINGS MODAL ══ -->
    <div class="settings-overlay" id="settingsOverlay">
      <div class="settings-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title">הגדרות</div>
        <div class="sheet-field">
          <label class="field-label">הטקסט שיופיע על הפריט הנבחר</label>
          <input class="field-input" id="settingsInput" type="text" dir="rtl" placeholder="הכנס טקסט...">
        </div>
        <button class="sheet-save" id="settingsSave">שמור</button>
        <button class="sheet-cancel" id="settingsCancel">ביטול</button>
      </div>
    </div>

  </div><!-- /screen -->
</div><!-- /iphone -->

<script src="js/app.js"></script>
</body>
</html>
